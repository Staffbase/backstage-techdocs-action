name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  update_release_draft:
    name: Update Release
    uses: Staffbase/gha-workflows/.github/workflows/template_release_drafter.yml@a0a564e9c659ab1a6423eb3cf4c755957e603d42 # v13.1.0
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
